name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --bin reqtool --target ${{ matrix.target }}
          else
            cargo build --release --bin reqtool --target ${{ matrix.target }}
          fi

      - name: Package binary
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          if [[ "$TARGET" == *windows* ]]; then
            ARTIFACT="reqtool-${TARGET}.exe"
            mv target/${TARGET}/release/reqtool.exe ${ARTIFACT}
          else
            ARTIFACT="reqtool-${TARGET}"
            mv target/${TARGET}/release/reqtool ${ARTIFACT}
            strip ${ARTIFACT} || true
          fi
          echo "ARTIFACT=${ARTIFACT}" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
